<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>マイ名簿アプリ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>👤 ユーザー管理システム</h2>
    
    <div class="top-bar">
        <button class="add-main-btn" onclick="openModalForAdd()">＋ 新規ユーザー登録</button>
        <input type="text" id="search" class="search-box" placeholder="🔍 名前や場所で検索...">
        
        <select id="sort-select" class="sort-box">
            <option value="none">並べ替え: 指定なし</option>
            <option value="id-asc">ID順 (昇順)</option>
            <option value="name-asc">名前 (あいうえお順)</option>
            <option value="place-asc">入所場所順</option>
        </select>

        <button onclick="exportData()" style="padding:10px; cursor:pointer; background:#f8f9fa; border:1px solid #ddd; border-radius:4px;">書き出し</button>
        <button onclick="document.getElementById('import-file').click()" style="padding:10px; cursor:pointer; background:#f8f9fa; border:1px solid #ddd; border-radius:4px;">読み込み</button>
        <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importData(event)">
    </div>

    <table>
        <thead>
            <tr>
                <th style="width: 10%;">ID</th>
                <th style="width: 25%;">名前</th>
                <th style="width: 25%;">入所場所</th>
                <th style="width: 25%;">備考</th>
                <th style="width: 15%;">操作</th>
            </tr>
        </thead>
        <tbody id="user-list"></tbody>
    </table>
</div>

<div id="user-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="modal-title" style="margin-top: 0;">詳細情報</h3>
        
        <div class="modal-header-grid">
            <div class="input-unit">
                <label>ID</label>
                <input type="text" id="m-userId" placeholder="001">
            </div>
            <div class="input-unit">
                <label>名前</label>
                <input type="text" id="m-userName" placeholder="氏名">
            </div>
            <div class="input-unit">
                <label>入所場所</label>
                <input type="text" id="m-userPlace" placeholder="場所">
            </div>
        </div>

        <div class="modal-body">
            <label>備考内容</label>
            <textarea id="m-userInfo" placeholder="詳細な備考を入力してください"></textarea>
        </div>

        <div class="modal-footer">
            <button class="cancel-btn" onclick="closeModal()">キャンセル</button>
            <button id="modal-save-btn" class="save-btn">保存する</button>
        </div>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
